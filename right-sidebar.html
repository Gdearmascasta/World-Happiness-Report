		<title>Radar Chart - World Happiness Report</title>
		<meta charset="utf-8" />

		<link rel="stylesheet" href="assets/css/main.css" />
		<noscript><link rel="stylesheet" href="assets/css/noscript.css" /></noscript>
		<script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
	</head>
	<body class="is-preload">
		<div id="page-wrapper">

			<!-- Header -->
				<div id="header">

					<!-- Inner -->
						<div class="inner">
							<header>
								<h1><a href="index.html" id="logo">World Happiness Report</a></h1>
							</header>
						</div>

					<!-- Nav -->
						<nav id="nav">
							<ul>
								<li><a href="index.html">Home</a></li>
								<li><a href="left-sidebar.html">Line Chart</a></li>
								<li><a href="right-sidebar.html">Radar Chart</a></li>
								<li><a href="no-sidebar.html">slide Chart</a></li>
							</ul>
						</nav>

				</div>

			<!-- Main -->
				<div class="wrapper style1">

					<div class="container">
						<article id="main">
							<header>
								<h2>Radar Chart</h2>
								<p>
									Visualización de tendencias de felicidad a través de gráficos de radar
								</p>
							</header>
							<div id="radar-chart"></div>
							<script>
								// Sample data for radar chart
								var data = [{
									type: 'scatterpolar',
									r: [39.4, 39.3, 39.2, 39.1, 39.0],
									theta: ['2015', '2016', '2017', '2018', '2019'],
									fill: 'toself',
									name: 'Happiness Score'
								}];

								var layout = {
									polar: {
										radialaxis: {
											visible: true,
											range: [0, 10]
										}
									},
									showlegend: false
								};

								Plotly.newPlot('radar-chart', data, layout);
							</script>
						</article>
					</div>

				</div>



		</div>
